<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Turning Research Notes Into Patterns</title>
  <desc id="desc">A messy cluster of research notes on the left being organized into affinity groups, feeding into a single case journey map on the right.</desc>

  <defs>
    <linearGradient id="bgL4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <marker id="arrowL4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#69c48a"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgL4)"/>

  <text x="185" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.3" fill="#8fa5bd">RAW NOTES</text>

  <g fill="#26374a" stroke="#8fa5bd" stroke-width="1.5">
    <rect x="70" y="95" width="70" height="50" rx="4" transform="rotate(-6 105 120)"/>
    <rect x="150" y="110" width="70" height="50" rx="4" transform="rotate(4 185 135)"/>
    <rect x="90" y="160" width="70" height="50" rx="4" transform="rotate(3 125 185)"/>
    <rect x="175" y="185" width="70" height="50" rx="4" transform="rotate(-5 210 210)"/>
    <rect x="60" y="220" width="70" height="50" rx="4" transform="rotate(7 95 245)"/>
    <rect x="140" y="245" width="70" height="50" rx="4" transform="rotate(-3 175 270)"/>
  </g>

  <text x="185" y="310" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6d84a0">sixty pages, one pile</text>

  <line x1="270" y1="200" x2="380" y2="200" stroke="#69c48a" stroke-width="2.5" marker-end="url(#arrowL4)"/>

  <text x="530" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.3" fill="#69c48a">AFFINITY GROUPS</text>

  <rect x="390" y="100" width="130" height="55" rx="8" fill="#1e3327" stroke="#69c48a" stroke-width="2"/>
  <text x="455" y="132" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#cfe9d9">inconsistent outcomes</text>

  <rect x="390" y="165" width="130" height="55" rx="8" fill="#1e3327" stroke="#69c48a" stroke-width="2"/>
  <text x="455" y="188" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#cfe9d9">hard/easy mixed</text>
  <text x="455" y="205" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#cfe9d9">at intake</text>

  <rect x="390" y="230" width="130" height="55" rx="8" fill="#1e3327" stroke="#69c48a" stroke-width="2"/>
  <text x="455" y="262" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#cfe9d9">unclear follow up</text>

  <line x1="530" y1="185" x2="620" y2="185" stroke="#69c48a" stroke-width="2.5" marker-end="url(#arrowL4)"/>

  <text x="870" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1.3" fill="#e0a458">ONE CASE JOURNEY</text>

  <line x1="640" y1="185" x2="1140" y2="185" stroke="#4d6d82" stroke-width="2"/>
  <circle cx="660" cy="185" r="8" fill="#e0a458"/>
  <circle cx="800" cy="185" r="8" fill="#e0a458"/>
  <circle cx="940" cy="185" r="8" fill="#e0a458"/>
  <circle cx="1100" cy="185" r="8" fill="#e0a458"/>

  <text x="660" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">intake</text>
  <text x="800" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">review</text>
  <text x="940" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">decision</text>
  <text x="1100" y="215" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">notify</text>

  <text x="600" y="555" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6d84a0">every theme from research had a specific home on this journey</text>
</svg>
