<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">The Human Process I Set Out to Replace</title>
  <desc id="desc">A single case moving through a long chain of human reviewers and handoffs, ending in one of several different possible outcomes.</desc>

  <defs>
    <linearGradient id="bgL1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <marker id="arrowL1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0a458"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgL1)"/>

  <text x="600" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#e0a458">ONE CASE, MANY HANDS</text>

  <rect x="60" y="285" width="60" height="70" rx="6" fill="#2b3d51" stroke="#8fa5bd" stroke-width="2"/>
  <line x1="72" y1="305" x2="108" y2="305" stroke="#8fa5bd" stroke-width="2"/>
  <line x1="72" y1="318" x2="108" y2="318" stroke="#8fa5bd" stroke-width="2"/>
  <line x1="72" y1="331" x2="96" y2="331" stroke="#8fa5bd" stroke-width="2"/>
  <text x="90" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">case in</text>

  <line x1="120" y1="320" x2="180" y2="320" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowL1)"/>

  <g id="reviewer-template">
    <circle r="30" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
    <circle cy="-8" r="9" fill="none" stroke="#f3e4cf" stroke-width="2.2"/>
    <path d="M -14 14 Q 0 -4 14 14" fill="none" stroke="#f3e4cf" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <use href="#reviewer-template" x="240" y="320"/>
  <text x="240" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">reviewer 1</text>

  <line x1="270" y1="320" x2="330" y2="320" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowL1)"/>

  <use href="#reviewer-template" x="390" y="320"/>
  <text x="390" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">reviewer 2</text>

  <line x1="420" y1="320" x2="480" y2="320" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowL1)"/>

  <use href="#reviewer-template" x="540" y="320"/>
  <text x="540" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">reviewer 3</text>

  <line x1="570" y1="320" x2="630" y2="320" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowL1)"/>

  <use href="#reviewer-template" x="690" y="320"/>
  <text x="690" y="378" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">reviewer 4</text>

  <line x1="720" y1="300" x2="800" y2="255" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowL1)"/>
  <line x1="720" y1="320" x2="800" y2="320" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowL1)"/>
  <line x1="720" y1="340" x2="800" y2="385" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowL1)"/>

  <circle cx="835" cy="255" r="20" fill="#2b3d51" stroke="#69c48a" stroke-width="2.5"/>
  <path d="M826,255 l6,7 l13,-15" fill="none" stroke="#69c48a" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="835" cy="320" r="20" fill="#2b3d51" stroke="#e0a458" stroke-width="2.5"/>
  <text x="835" y="327" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="19" fill="#e0a458">?</text>

  <circle cx="835" cy="385" r="20" fill="#2b3d51" stroke="#d9736c" stroke-width="2.5"/>
  <line x1="827" y1="377" x2="843" y2="393" stroke="#d9736c" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="843" y1="377" x2="827" y2="393" stroke="#d9736c" stroke-width="2.8" stroke-linecap="round"/>

  <text x="960" y="260" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">closed</text>
  <text x="960" y="325" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">escalated</text>
  <text x="960" y="390" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">sent back</text>

  <text x="600" y="555" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6d84a0">same kind of case, different reviewers, different calls</text>
</svg>
