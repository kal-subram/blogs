<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Sketching the Workflow in Visily</title>
  <desc id="desc">Three rough low fidelity wireframe screens laid out side by side, a queue screen, a case detail screen, and an escalation screen.</desc>

  <defs>
    <linearGradient id="bgL6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgL6)"/>

  <text x="600" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.3" fill="#8fa5bd">LOW FIDELITY FIRST</text>

  <g>
    <rect x="90" y="120" width="290" height="380" rx="8" fill="#26374a" stroke="#8fa5bd" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="115" y="145" width="240" height="24" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="115" y="185" width="240" height="50" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="115" y="245" width="240" height="50" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="115" y="305" width="240" height="50" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="115" y="365" width="240" height="50" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <text x="235" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">queue</text>
  </g>

  <g>
    <rect x="455" y="120" width="290" height="380" rx="8" fill="#26374a" stroke="#8fa5bd" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="480" y="145" width="240" height="24" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="480" y="185" width="240" height="120" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="480" y="320" width="110" height="34" rx="4" fill="none" stroke="#69c48a" stroke-width="1.5"/>
    <text x="535" y="342" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#9fc9ac">approve</text>
    <rect x="610" y="320" width="110" height="34" rx="4" fill="none" stroke="#e0a458" stroke-width="1.5"/>
    <text x="665" y="342" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#c79a68">escalate</text>
    <text x="600" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">case detail</text>
  </g>

  <g>
    <rect x="820" y="120" width="290" height="380" rx="8" fill="#26374a" stroke="#8fa5bd" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="845" y="145" width="240" height="24" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="845" y="185" width="240" height="60" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <rect x="845" y="260" width="240" height="60" rx="3" fill="none" stroke="#a9b8c9" stroke-width="1.5"/>
    <text x="965" y="480" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">escalation</text>
  </g>

  <text x="600" y="555" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6d84a0">rough on purpose, so feedback stayed structural, not cosmetic</text>
</svg>
