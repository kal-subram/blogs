<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">From Patterns to a Workflow</title>
  <desc id="desc">A branching decision tree showing a case splitting at a triage step into a fast automated path and a human review path, based on how much ambiguity it carries.</desc>

  <defs>
    <linearGradient id="bgL5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <marker id="arrowL5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8fa5bd"/>
    </marker>
    <marker id="arrowGreen5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#69c48a"/>
    </marker>
    <marker id="arrowAmber5" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0a458"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bgL5)"/>

  <text x="600" y="70" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="1.3" fill="#8fa5bd">TRIAGE FIRST</text>

  <circle cx="150" cy="315" r="20" fill="#2b3d51" stroke="#8fa5bd" stroke-width="2"/>
  <text x="150" y="360" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">case in</text>

  <line x1="170" y1="315" x2="260" y2="315" stroke="#8fa5bd" stroke-width="2.5" marker-end="url(#arrowL5)"/>

  <rect x="270" y="280" width="150" height="70" rx="10" fill="#26374a" stroke="#8fa5bd" stroke-width="2"/>
  <text x="345" y="311" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#e8eef5">Triage</text>
  <text x="345" y="331" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a9b8c9">how much ambiguity?</text>

  <line x1="420" y1="295" x2="560" y2="200" stroke="#69c48a" stroke-width="2.5" marker-end="url(#arrowGreen5)"/>
  <line x1="420" y1="335" x2="560" y2="430" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowAmber5)"/>

  <rect x="570" y="150" width="220" height="90" rx="10" fill="#1e3327" stroke="#69c48a" stroke-width="2.5"/>
  <text x="680" y="188" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#cfe9d9">Clear cut case</text>
  <text x="680" y="210" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#9fc9ac">fast, mostly automated</text>

  <rect x="570" y="385" width="220" height="90" rx="10" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
  <text x="680" y="423" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#f3e4cf">Ambiguous case</text>
  <text x="680" y="445" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#c79a68">straight to a reviewer, with context</text>

  <line x1="790" y1="195" x2="900" y2="195" stroke="#69c48a" stroke-width="2" marker-end="url(#arrowGreen5)"/>
  <line x1="790" y1="430" x2="900" y2="430" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowAmber5)"/>

  <circle cx="925" cy="195" r="18" fill="#2b3d51" stroke="#69c48a" stroke-width="2.5"/>
  <path d="M916,195 l6,7 l12,-14" fill="none" stroke="#69c48a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="925" cy="430" r="18" fill="#2b3d51" stroke="#e0a458" stroke-width="2.5"/>
  <text x="925" y="437" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#e0a458">?</text>

  <text x="600" y="555" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6d84a0">the logic came before a single screen was drawn</text>
</svg>
