<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">The Best AI Product Does Not Win If Nobody Understands It</title>
  <desc id="desc">Two identical AI model diagrams side by side. On the left, labeled Impressive, the model connects to three confused stakeholders each marked with a question mark. On the right, labeled Understood, the same model connects to three stakeholders each marked with a checkmark.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <marker id="arrowWarn2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0a458"/>
    </marker>
    <marker id="arrowGood2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#69c48a"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <line x1="600" y1="60" x2="600" y2="570" stroke="#33465c" stroke-width="1.5" stroke-dasharray="4 6"/>

  <text x="300" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2" fill="#e0a458">IMPRESSIVE</text>

  <rect x="220" y="265" width="160" height="80" rx="10" fill="#26374a" stroke="#e0a458" stroke-width="2"/>
  <text x="300" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#e8eef5">AI</text>
  <text x="300" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#e8eef5">MODEL</text>

  <line x1="260" y1="265" x2="150" y2="160" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowWarn2)"/>
  <line x1="380" y1="290" x2="470" y2="230" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowWarn2)"/>
  <line x1="300" y1="345" x2="300" y2="460" stroke="#e0a458" stroke-width="2" marker-end="url(#arrowWarn2)"/>

  <circle cx="130" cy="140" r="24" fill="#3a2e22" stroke="#e0a458" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#e0a458">?</text>
  <text x="130" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a9825a">BUYER</text>

  <circle cx="495" cy="210" r="24" fill="#3a2e22" stroke="#e0a458" stroke-width="2"/>
  <text x="495" y="218" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#e0a458">?</text>
  <text x="495" y="253" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a9825a">SELLER</text>

  <circle cx="300" cy="490" r="24" fill="#3a2e22" stroke="#e0a458" stroke-width="2"/>
  <text x="300" y="498" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#e0a458">?</text>
  <text x="300" y="533" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#a9825a">REVIEWER</text>

  <text x="300" y="580" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#a9825a">capability everyone nods at, no one can explain</text>

  <text x="900" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="2" fill="#69c48a">UNDERSTOOD</text>

  <rect x="820" y="265" width="160" height="80" rx="10" fill="#26374a" stroke="#69c48a" stroke-width="2"/>
  <text x="900" y="300" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#e8eef5">AI</text>
  <text x="900" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#e8eef5">MODEL</text>

  <line x1="860" y1="265" x2="750" y2="160" stroke="#69c48a" stroke-width="2" marker-end="url(#arrowGood2)"/>
  <line x1="980" y1="290" x2="1070" y2="230" stroke="#69c48a" stroke-width="2" marker-end="url(#arrowGood2)"/>
  <line x1="900" y1="345" x2="900" y2="460" stroke="#69c48a" stroke-width="2" marker-end="url(#arrowGood2)"/>

  <circle cx="730" cy="140" r="24" fill="#1e3a2c" stroke="#69c48a" stroke-width="2"/>
  <path d="M720,140 l6,7 l12,-14" fill="none" stroke="#69c48a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="730" y="185" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#8fc9a4">BUYER</text>

  <circle cx="1095" cy="210" r="24" fill="#1e3a2c" stroke="#69c48a" stroke-width="2"/>
  <path d="M1085,210 l6,7 l12,-14" fill="none" stroke="#69c48a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1095" y="253" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#8fc9a4">SELLER</text>

  <circle cx="900" cy="490" r="24" fill="#1e3a2c" stroke="#69c48a" stroke-width="2"/>
  <path d="M890,490 l6,7 l12,-14" fill="none" stroke="#69c48a" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="900" y="533" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#8fc9a4">REVIEWER</text>

  <text x="900" y="580" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#8fc9a4">capability people can explain, trust, and use</text>
</svg>
