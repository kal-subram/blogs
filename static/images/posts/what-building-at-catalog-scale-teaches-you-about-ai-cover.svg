<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">What Building at Catalog Scale Teaches You About AI</title>
  <desc id="desc">A long tail distribution curve, a tall peak labeled Common Cases on the left tapering into a long, sparse tail labeled The Long Tail extending to the right, illustrating that at catalog scale the tail is not a footnote but the job.</desc>

  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <linearGradient id="curve" gradientUnits="userSpaceOnUse" x1="120" y1="0" x2="1080" y2="0">
      <stop offset="0%" stop-color="#8fa5bd"/>
      <stop offset="35%" stop-color="#8fa5bd"/>
      <stop offset="70%" stop-color="#e0a458"/>
      <stop offset="100%" stop-color="#e0a458"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>

  <line x1="120" y1="470" x2="1080" y2="470" stroke="#33465c" stroke-width="1.5"/>

  <path d="M 120 470
           C 150 470, 160 150, 230 130
           C 300 112, 320 250, 370 340
           C 420 400, 470 430, 540 448
           C 620 465, 700 468, 800 469
           C 880 470, 960 470, 1080 470
           L 1080 470
           L 120 470 Z"
        fill="url(#curve)" opacity="0.85"/>

  <path d="M 120 470
           C 150 470, 160 150, 230 130
           C 300 112, 320 250, 370 340
           C 420 400, 470 430, 540 448
           C 620 465, 700 468, 800 469
           C 880 470, 960 470, 1080 470"
        fill="none" stroke="#e8eef5" stroke-width="2"/>

  <circle cx="620" cy="464" r="4" fill="#e0a458"/>
  <circle cx="700" cy="467" r="3.5" fill="#e0a458"/>
  <circle cx="790" cy="468.5" r="3" fill="#e0a458"/>
  <circle cx="890" cy="469.5" r="2.5" fill="#e0a458"/>
  <circle cx="1000" cy="470" r="2" fill="#e0a458"/>

  <text x="230" y="95" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="1.5" fill="#8fa5bd">COMMON CASES</text>
  <text x="230" y="122" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#a9bccf">the part the demo shows</text>

  <text x="870" y="380" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="1.5" fill="#e0a458">THE LONG TAIL</text>
  <text x="870" y="407" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#c79a68">not a footnote, the job</text>

  <text x="600" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#8494a6">billions of listings, many languages, many ways to describe the same object</text>
</svg>
