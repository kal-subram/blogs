<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Launch Is Where AI Systems Start Learning</title>
  <desc id="desc">A straight path ending at a finish flag labeled Traditional Software next to a circular loop of Launch, Monitor, Learn, and Improve labeled AI Systems.</desc>

  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#111a24"/>
    </linearGradient>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8fa5bd"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e0a458"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>
  <line x1="600" y1="60" x2="600" y2="570" stroke="#33465c" stroke-width="1.5" stroke-dasharray="4 6"/>

  <text x="215" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#8fa5bd">TRADITIONAL SOFTWARE</text>

  <circle cx="110" cy="330" r="14" fill="#2b3d51" stroke="#8fa5bd" stroke-width="2"/>
  <text x="110" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">Build</text>

  <line x1="124" y1="330" x2="205" y2="330" stroke="#8fa5bd" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <circle cx="230" cy="330" r="14" fill="#2b3d51" stroke="#8fa5bd" stroke-width="2"/>
  <text x="230" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">Test</text>

  <line x1="244" y1="330" x2="325" y2="330" stroke="#8fa5bd" stroke-width="2.5" marker-end="url(#arrow3)"/>
  <circle cx="350" cy="330" r="14" fill="#2b3d51" stroke="#8fa5bd" stroke-width="2"/>
  <text x="350" y="365" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#a9b8c9">Launch</text>

  <line x1="364" y1="330" x2="435" y2="330" stroke="#8fa5bd" stroke-width="2.5" marker-end="url(#arrow3)"/>

  <g transform="translate(450,305)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#cdd9e6" stroke-width="3"/>
    <path d="M0,0 h34 l-9,7 l9,7 h-34 z" fill="#69c48a"/>
  </g>

  <text x="215" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6d84a0">launch is the finish line</text>

  <text x="985" y="90" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#e0a458">AI SYSTEMS</text>

  <circle cx="900" cy="220" r="34" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
  <text x="900" y="225" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f3e4cf">Launch</text>

  <circle cx="1035" cy="330" r="34" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
  <text x="1035" y="335" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f3e4cf">Monitor</text>

  <circle cx="985" cy="465" r="34" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
  <text x="985" y="470" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f3e4cf">Learn</text>

  <circle cx="820" cy="440" r="34" fill="#3a2e22" stroke="#e0a458" stroke-width="2.5"/>
  <text x="820" y="445" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#f3e4cf">Improve</text>

  <path d="M 928 235 A 130 130 0 0 1 1015 305" fill="none" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <path d="M 1030 364 A 100 100 0 0 1 1000 440" fill="none" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <path d="M 953 462 A 120 120 0 0 1 852 456" fill="none" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowLoop)"/>
  <path d="M 805 408 A 130 130 0 0 1 872 245" fill="none" stroke="#e0a458" stroke-width="2.5" marker-end="url(#arrowLoop)"/>

  <text x="985" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#a9825a">launch is where the learning loop begins</text>
</svg>
