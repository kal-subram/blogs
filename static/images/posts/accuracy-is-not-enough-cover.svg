<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">Accuracy Is Not Enough</title>
  <desc id="desc">An iceberg diagram: a small visible tip above the waterline labeled False Positives, and a much larger hidden mass below the waterline labeled False Negatives.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d2b3a"/>
      <stop offset="100%" stop-color="#16222e"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16303f"/>
      <stop offset="100%" stop-color="#0d1b24"/>
    </linearGradient>
    <linearGradient id="tip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dff1ff"/>
      <stop offset="100%" stop-color="#a9d4ec"/>
    </linearGradient>
    <linearGradient id="berg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a5468" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#233a4a" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="330" fill="url(#sky)"/>
  <rect x="0" y="330" width="1200" height="300" fill="url(#water)"/>

  <text x="880" y="80" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#e0a458">FALSE POSITIVES</text>
  <text x="880" y="108" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#c79a68">visible &#183; noisy &#183; escalated</text>

  <text x="330" y="560" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="1.5" fill="#d9736c">FALSE NEGATIVES</text>
  <text x="330" y="588" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#c78d89">quiet &#183; undetected &#183; discovered later</text>

  <path d="M 560 330 L 620 175 L 660 245 L 700 330 Z" fill="url(#tip)"/>
  <path d="M 560 330 L 700 330 L 690 340 L 570 340 Z" fill="#c7dfee"/>

  <path d="M 570 340
           C 470 400, 420 470, 460 540
           C 500 600, 640 615, 740 580
           C 860 540, 880 460, 820 400
           C 770 350, 660 335, 570 340 Z"
        fill="url(#berg)" stroke="#4d6d82" stroke-width="1.5"/>

  <path d="M 600 350 C 560 400, 545 450, 570 500" fill="none" stroke="#527085" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/>
  <path d="M 700 345 C 740 390, 760 440, 730 500" fill="none" stroke="#527085" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.6"/>

  <line x1="0" y1="330" x2="1200" y2="330" stroke="#7fb3cf" stroke-width="2.5" opacity="0.8"/>
  <path d="M0,330 q15,-6 30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0 t30,0"
        fill="none" stroke="#7fb3cf" stroke-width="1" opacity="0.35"/>
</svg>
