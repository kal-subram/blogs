baseURL = 'https://kal-subram.github.io/blogs/'
locale = 'en-us'
title = "Product Build Notes"
theme = 'PaperMod'

[params]
  env = 'production'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

[params.homeInfoParams]
  Title = "Notes on product leadership"
  Content = """
Twenty years now in product management and leadership, with AI taking up a good chunk of the last few. This is where I put down what I have picked up along the way, mostly around six things I keep coming back to:
"""

[[menu.main]]
  name = 'Home'
  url = '/'
  weight = 10

[[menu.main]]
  name = 'Posts'
  url = '/posts/'
  weight = 20

[[menu.main]]
  name = 'Categories'
  url = '/categories/'
  weight = 30

[markup.highlight]
  noClasses = false
